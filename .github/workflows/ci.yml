name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Qt system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check klipwerk

      - name: Type-check
        run: mypy klipwerk
        continue-on-error: true   # mypy not blocking yet — tighten later

      - name: Test
        run: pytest -v
        env:
          QT_QPA_PLATFORM: offscreen
